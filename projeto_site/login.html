<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login de Clientes – TechSolutions</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Seletores de tipo e id específicos da página de login */
    body.pagina-form {
      background: radial-gradient(ellipse at 20% 80%, rgba(124,58,237,0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(91,33,182,0.1) 0%, transparent 50%),
                  var(--cor-fundo);
    }

    /* Acumulação de estilos: card base + personalização login */
    .form-container.login-card {
      position: relative;
    }

    .form-container.login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: linear-gradient(135deg, rgba(91,33,182,0.2), rgba(124,58,237,0.2), transparent);
      z-index: -1;
    }

    /* Seletor de atributo: inputs com type=email ou type=password */
    input[type="email"],
    input[type="password"] {
      letter-spacing: 0.02em;
    }

    input[type="password"] {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
    }

    /* Wrapper de senha com botão de visibilidade */
    .senha-wrapper {
      position: relative;
    }

    .senha-wrapper input {
      padding-right: 48px;
    }

    .btn-ver-senha {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--cor-texto-suave);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      transition: var(--transicao);
    }

    .btn-ver-senha:hover { color: var(--cor-primaria); }

    /* Link estilizado inline */
    .link-inline {
      color: var(--cor-primaria);
      font-size: 0.85rem;
      transition: var(--transicao);
    }

    .link-inline:hover { text-decoration: underline; }

    /* Mensagem de feedback no topo do form */
    #msg-feedback {
      display: none;
      margin-bottom: 1.2rem;
    }

    /* Sobrescrita: botão primário dentro do form-acoes fica mais largo */
    .form-acoes .btn-primario {
      flex: 2;
    }

    /* Separador estilizado */
    .separador {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.2rem 0;
      color: var(--cor-texto-suave);
      font-size: 0.8rem;
    }

    .separador::before,
    .separador::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cor-borda);
    }
  </style>
</head>
<body class="pagina-form">

  <div class="form-container login-card anim-entrada">

    <!-- Cabeçalho do formulário com logo -->
    <header class="form-header">
      <a href="index.html" class="logo">
        <div class="logo-icone">TS</div>
        <span class="logo-texto">Tech<span>Solutions</span></span>
      </a>
      <h1>Login de Clientes</h1>
      <p>Acesse o portal de serviços da TechSolutions</p>
    </header>

    <!-- Mensagem de feedback -->
    <div id="msg-feedback" role="alert" aria-live="polite"></div>

    <!-- Formulário de login -->
    <main>
      <div class="form-grupo">
        <label for="campo-login">E-mail (Login)</label>
        <input
          type="email"
          id="campo-login"
          name="login"
          placeholder="seuemail@empresa.com.br"
          autocomplete="email"
          aria-describedby="erro-login"
        />
        <span class="erro-campo" id="erro-login" role="alert"></span>
      </div>

      <div class="form-grupo">
        <label for="campo-senha">Senha</label>
        <div class="senha-wrapper">
          <input
            type="password"
            id="campo-senha"
            name="senha"
            placeholder="••••••••"
            autocomplete="current-password"
            aria-describedby="erro-senha"
          />
          <button
            type="button"
            class="btn-ver-senha"
            id="btn-ver-senha"
            aria-label="Mostrar/ocultar senha"
            title="Mostrar senha">
            👁
          </button>
        </div>
        <span class="erro-campo" id="erro-senha" role="alert"></span>
      </div>

      <div style="text-align:right; margin-top:-0.5rem; margin-bottom: 1.2rem;">
        <a href="troca-senha.html" class="link-inline">Esqueci minha senha</a>
      </div>

      <div class="form-acoes">
        <button type="button" class="btn btn-primario" id="btn-login">
          🔐 Realizar Login
        </button>
        <button type="button" class="btn btn-secundario" id="btn-limpar">
          Limpar
        </button>
      </div>
    </main>

    <div class="separador">ou</div>

    <footer class="form-rodape">
      Não tem cadastro?
      <a href="cadastro.html" class="link-inline">Criar conta gratuita →</a>
    </footer>

  </div>

<script>
  // ============================================================
  // VALIDAÇÕES – Página de Login
  // ============================================================

  const campoLogin  = document.getElementById('campo-login');
  const campoSenha  = document.getElementById('campo-senha');
  const btnLogin    = document.getElementById('btn-login');
  const btnLimpar   = document.getElementById('btn-limpar');
  const btnVerSenha = document.getElementById('btn-ver-senha');
  const msgFeedback = document.getElementById('msg-feedback');

  // Utilitário: validar formato de e-mail
  function emailValido(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email.trim());
  }

  // Exibir/ocultar erro de campo
  function mostrarErroCampo(campo, spanId, mensagem) {
    const span = document.getElementById(spanId);
    campo.classList.add('campo-invalido');
    span.textContent = mensagem;
    span.style.display = 'block';
  }

  function limparErroCampo(campo, spanId) {
    const span = document.getElementById(spanId);
    campo.classList.remove('campo-invalido');
    span.textContent = '';
    span.style.display = 'none';
  }

  function mostrarMensagem(tipo, texto) {
    msgFeedback.className = tipo === 'erro' ? 'msg-erro' : 'msg-sucesso';
    msgFeedback.textContent = texto;
    msgFeedback.style.display = 'block';
  }

  // ---- Botão Realizar Login ----
  btnLogin.addEventListener('click', function () {
    let valido = true;

    // Resetar erros
    limparErroCampo(campoLogin, 'erro-login');
    limparErroCampo(campoSenha, 'erro-senha');
    msgFeedback.style.display = 'none';

    // Validação do login (e-mail)
    if (campoLogin.value.trim() === '') {
      mostrarErroCampo(campoLogin, 'erro-login', 'O campo de login é obrigatório.');
      valido = false;
    } else if (!emailValido(campoLogin.value)) {
      mostrarErroCampo(campoLogin, 'erro-login', 'Informe um e-mail válido (ex: nome@dominio.com).');
      valido = false;
    }

    // Validação da senha
    if (campoSenha.value === '') {
      mostrarErroCampo(campoSenha, 'erro-senha', 'A senha é obrigatória.');
      valido = false;
    }

    if (!valido) {
      mostrarMensagem('erro', '⚠️ Corrija os erros acima para continuar.');
      return;
    }

    // Sucesso — salva estado de login e navega para a página principal
    mostrarMensagem('sucesso', '✅ Validação realizada com sucesso! Redirecionando...');
    sessionStorage.setItem('techsolutions_logado', '1');
    sessionStorage.setItem('techsolutions_usuario', campoLogin.value.trim());

    setTimeout(function () {
      window.location.href = 'index.html';
    }, 1400);
  });

  // ---- Botão Limpar ----
  btnLimpar.addEventListener('click', function () {
    campoLogin.value  = '';
    campoSenha.value  = '';
    limparErroCampo(campoLogin, 'erro-login');
    limparErroCampo(campoSenha, 'erro-senha');
    msgFeedback.style.display = 'none';
    campoLogin.focus();
  });

  // ---- Botão ver/ocultar senha ----
  btnVerSenha.addEventListener('click', function () {
    const tipo = campoSenha.type === 'password' ? 'text' : 'password';
    campoSenha.type = tipo;
    this.textContent = tipo === 'password' ? '👁' : '🙈';
  });

  // ---- Validação em tempo real (campo perde foco) ----
  campoLogin.addEventListener('blur', function () {
    if (this.value.trim() !== '' && !emailValido(this.value)) {
      mostrarErroCampo(this, 'erro-login', 'E-mail inválido.');
    } else {
      limparErroCampo(this, 'erro-login');
    }
  });

  campoLogin.addEventListener('focus', function () {
    limparErroCampo(this, 'erro-login');
  });

  campoSenha.addEventListener('focus', function () {
    limparErroCampo(this, 'erro-senha');
  });
</script>

</body>
</html>
