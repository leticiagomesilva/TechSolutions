<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Clientes – TechSolutions</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Estilos internos da página de cadastro */
    body.pagina-form {
      background:
        radial-gradient(ellipse at 30% 20%, rgba(91,33,182,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 90%, rgba(124,58,237,0.1) 0%, transparent 50%),
        var(--cor-fundo);
      padding: 2rem;
      align-items: flex-start;
    }

    /* Seletor de classe: formulário largo para cadastro */
    .form-container.cadastro-card {
      margin: 0 auto;
    }

    /* Seletor de id para instruções de senha */
    #instrucoes-senha {
      background: rgba(91,33,182,0.05);
      border: 1px solid rgba(91,33,182,0.12);
      border-radius: var(--raio);
      padding: 0.9rem 1.1rem;
      font-size: 0.8rem;
      color: var(--cor-texto-suave);
      line-height: 1.8;
      width: 100%;
      box-sizing: border-box;
    }

    /* Seletor de tipo: output como bloco */
    output#instrucoes-senha {
      display: block;
      margin-bottom: 1rem;
    }

    /* Seletor de atributo: inputs com maxlength (CPF, tel) */
    input[maxlength] {
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
    }

    /* Sobrescrita: input de data */
    input[type="date"] {
      color-scheme: dark;
      font-family: var(--fonte-corpo);
      letter-spacing: 0;
    }

    /* Seletor de pseudo-classe: campos opcionais com placeholder diferente */
    input[placeholder*="opcional"]::placeholder {
      color: rgba(148, 163, 184, 0.4);
      font-style: italic;
    }

    /* Rádio personalizado */
    .radio-personalizado {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }

    .radio-personalizado label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1.5px solid var(--cor-borda);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: var(--cor-texto-suave);
      transition: var(--transicao);
    }

    .radio-personalizado input[type="radio"] {
      width: auto;
      accent-color: var(--cor-primaria);
    }

    .radio-personalizado label:has(input:checked) {
      border-color: var(--cor-primaria);
      background: rgba(91,33,182,0.08);
      color: var(--cor-primaria);
    }

    #msg-feedback { display: none; margin-bottom: 1.2rem; }

    .senha-wrapper { position: relative; }
    .senha-wrapper input { padding-right: 48px; }
    .btn-ver-senha {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--cor-texto-suave); cursor: pointer;
      font-size: 1rem; padding: 4px;
      transition: var(--transicao);
    }
    .btn-ver-senha:hover { color: var(--cor-primaria); }

    /* Tabela usada para organizar campos de uma linha no cadastro */
    table.layout-form {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 0;
    }

    table.layout-form td {
      padding: 0;
      border: none;
      vertical-align: top;
    }

    table.layout-form td:first-child {
      padding-right: 0.8rem;
    }

    /* Indicador de força */
    .forca-senha { display: flex; gap: 4px; margin-top: 8px; }
    .forca-barra { flex: 1; height: 4px; border-radius: 2px; background: var(--cor-borda); transition: var(--transicao); }
    .forca-barra.ativa-fraca  { background: var(--cor-erro); }
    .forca-barra.ativa-media  { background: #f59e0b; }
    .forca-barra.ativa-forte  { background: var(--cor-sucesso); }
    .forca-texto { font-size: 0.75rem; color: var(--cor-texto-suave); margin-top: 4px; }

    @media (max-width: 600px) {
      table.layout-form tr { display: flex; flex-direction: column; }
      table.layout-form td:first-child { padding-right: 0; }
    }
  </style>
</head>
<body class="pagina-form">

  <div class="form-container largo cadastro-card anim-entrada">

    <header class="form-header">
      <a href="index.html" class="logo">
        <div class="logo-icone">TS</div>
        <span class="logo-texto">Tech<span>Solutions</span></span>
      </a>
      <h1>Cadastro de Clientes</h1>
      <p>Crie sua conta e acesse todos os serviços de TI</p>
    </header>

    <div id="msg-feedback" role="alert" aria-live="polite"></div>

    <main>
      <!-- E-mail / Login -->
      <div class="form-grupo">
        <label for="campo-email">E-mail (será seu login) <strong style="color:var(--cor-acento)">*</strong></label>
        <input type="email" id="campo-email" name="email"
               placeholder="seuemail@empresa.com.br"
               autocomplete="email"
               aria-describedby="erro-email" />
        <span class="erro-campo" id="erro-email" role="alert"></span>
      </div>

      <!-- Linha: Senha e Confirmação -->
      <table class="layout-form" aria-label="Campos de senha">
        <tr>
          <td>
            <div class="form-grupo">
              <label for="campo-senha">Senha <strong style="color:var(--cor-acento)">*</strong></label>
              <div class="senha-wrapper">
                <input type="password" id="campo-senha" name="senha"
                       placeholder="••••••••"
                       autocomplete="new-password"
                       aria-describedby="erro-senha" />
                <button type="button" class="btn-ver-senha" id="btn-ver1" title="Ver/ocultar">👁</button>
              </div>
              <div class="forca-senha" aria-hidden="true">
                <div class="forca-barra" id="barra1"></div>
                <div class="forca-barra" id="barra2"></div>
                <div class="forca-barra" id="barra3"></div>
              </div>
              <span class="forca-texto" id="forca-texto"></span>
              <span class="erro-campo" id="erro-senha" role="alert"></span>
            </div>
          </td>
          <td>
            <div class="form-grupo">
              <label for="campo-confirmacao">Confirmação de Senha <strong style="color:var(--cor-acento)">*</strong></label>
              <div class="senha-wrapper">
                <input type="password" id="campo-confirmacao" name="confirmacao"
                       placeholder="••••••••"
                       autocomplete="new-password"
                       aria-describedby="erro-confirmacao" />
                <button type="button" class="btn-ver-senha" id="btn-ver2" title="Ver/ocultar">👁</button>
              </div>
              <span class="erro-campo" id="erro-confirmacao" role="alert"></span>
            </div>
          </td>
        </tr>
      </table>

      <!-- Campo de saída: instruções sobre a senha -->
      <output id="instrucoes-senha" aria-label="Regras para criação de senha">
        📋 <strong>Regras da senha:</strong> mínimo 6 caracteres, com pelo menos 1 maiúscula, 1 número e 1 especial permitido:
        <strong>@ # $ % &amp; * ! ? / \ | - _ + . =</strong> &nbsp;|&nbsp;
        ❌ <strong>Não permitidos:</strong> ¨ { } [ ] ´ ` ~ ^ : ; &lt; &gt; , " '
      </output>

      <hr />

      <!-- Nome -->
      <div class="form-grupo">
        <label for="campo-nome">Nome Completo <strong style="color:var(--cor-acento)">*</strong></label>
        <input type="text" id="campo-nome" name="nome"
               placeholder="Ex: João da Silva"
               autocomplete="name"
               aria-describedby="erro-nome" />
        <span class="erro-campo" id="erro-nome" role="alert"></span>
      </div>

      <!-- Linha: CPF e Data de Nascimento -->
      <table class="layout-form" aria-label="Campos de CPF e nascimento">
        <tr>
          <td>
            <div class="form-grupo">
              <label for="campo-cpf">CPF <strong style="color:var(--cor-acento)">*</strong></label>
              <input type="text" id="campo-cpf" name="cpf"
                     placeholder="000.000.000-00"
                     maxlength="14"
                     inputmode="numeric"
                     aria-describedby="erro-cpf" />
              <span class="erro-campo" id="erro-cpf" role="alert"></span>
            </div>
          </td>
          <td>
            <div class="form-grupo">
              <label for="campo-nascimento">Data de Nascimento <strong style="color:var(--cor-acento)">*</strong></label>
              <input type="date" id="campo-nascimento" name="nascimento"
                     aria-describedby="erro-nascimento" />
              <span class="erro-campo" id="erro-nascimento" role="alert"></span>
            </div>
          </td>
        </tr>
      </table>

      <!-- Telefone -->
      <div class="form-grupo">
        <label for="campo-telefone">Celular / WhatsApp <span style="color:var(--cor-texto-suave); font-size:0.8rem">(opcional)</span></label>
        <input type="tel" id="campo-telefone" name="telefone"
               placeholder="(opcional) Ex: (81) 99123-4567"
               maxlength="15"
               inputmode="numeric"
               aria-describedby="erro-telefone" />
        <span class="erro-campo" id="erro-telefone" role="alert"></span>
      </div>

      <!-- Estado Civil (radio buttons) -->
      <div class="form-grupo">
        <label>Estado Civil <strong style="color:var(--cor-acento)">*</strong></label>
        <div class="radio-personalizado" id="grupo-estado-civil" role="radiogroup" aria-label="Estado civil">
          <label>
            <input type="radio" name="estado-civil" value="solteiro" checked /> Solteiro(a)
          </label>
          <label>
            <input type="radio" name="estado-civil" value="casado" /> Casado(a)
          </label>
          <label>
            <input type="radio" name="estado-civil" value="divorciado" /> Divorciado(a)
          </label>
          <label>
            <input type="radio" name="estado-civil" value="viuvo" /> Viúvo(a)
          </label>
        </div>
      </div>

      <!-- Escolaridade (select/combo) -->
      <div class="form-grupo">
        <label for="campo-escolaridade">Escolaridade</label>
        <select id="campo-escolaridade" name="escolaridade">
          <option value="1gi">1º Grau Incompleto</option>
          <option value="1gc">1º Grau Completo</option>
          <option value="2gc" selected>2º Grau Completo</option>
          <option value="sup">Nível Superior</option>
          <option value="pos">Pós-Graduado</option>
        </select>
      </div>

      <!-- Botões de ação -->
      <div class="form-acoes">
        <button type="button" class="btn btn-primario" id="btn-incluir">
          ✅ Incluir
        </button>
        <button type="button" class="btn btn-secundario" id="btn-limpar">
          Limpar
        </button>
        <button type="button" class="btn btn-secundario" id="btn-voltar">
          ← Voltar
        </button>
      </div>
    </main>

  </div>

<script>
  // ============================================================
  // REGRAS DE SENHA (mesmas da troca-senha)
  // ============================================================
  const CHARS_PERMITIDOS_ESPECIAIS = '@#$%&*!?/\\|-_+.=';
  const CHARS_PROIBIDOS = '¨{}[]´`~^:;<>,"\'';
  const CHARS_ESPECIAIS_TODOS = CHARS_PERMITIDOS_ESPECIAIS + CHARS_PROIBIDOS;

  function emailValido(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email.trim());
  }

  function validarSenha(senha) {
    const erros = [];
    if (senha.length < 6) erros.push('Mínimo de 6 caracteres.');
    if (!/[A-Z]/.test(senha)) erros.push('Deve conter pelo menos uma maiúscula.');
    if (!/[0-9]/.test(senha)) erros.push('Deve conter pelo menos um número.');
    if (![...CHARS_PERMITIDOS_ESPECIAIS].some(c => senha.includes(c)))
      erros.push('Deve conter pelo menos um caractere especial permitido.');
    if ([...CHARS_PROIBIDOS].some(c => senha.includes(c)))
      erros.push('Contém caracteres não permitidos.');
    return erros;
  }

  function calcularForca(senha) {
    if (!senha) return 0;
    let p = 0;
    if (senha.length >= 6) p++;
    if (senha.length >= 10) p++;
    if (/[A-Z]/.test(senha)) p++;
    if (/[0-9]/.test(senha)) p++;
    if ([...CHARS_PERMITIDOS_ESPECIAIS].some(c => senha.includes(c))) p++;
    return p <= 2 ? 1 : p <= 3 ? 2 : 3;
  }

  // ============================================================
  // ALGORITMO DE VALIDAÇÃO DE CPF
  // ============================================================
  function cpfValido(cpf) {
    const nums = cpf.replace(/\D/g, '');
    if (nums.length !== 11) return false;
    if (/^(\d)\1{10}$/.test(nums)) return false;

    let soma = 0;
    for (let i = 0; i < 9; i++) soma += parseInt(nums[i]) * (10 - i);
    let dig1 = (soma * 10) % 11;
    if (dig1 === 10 || dig1 === 11) dig1 = 0;
    if (dig1 !== parseInt(nums[9])) return false;

    soma = 0;
    for (let i = 0; i < 10; i++) soma += parseInt(nums[i]) * (11 - i);
    let dig2 = (soma * 10) % 11;
    if (dig2 === 10 || dig2 === 11) dig2 = 0;
    return dig2 === parseInt(nums[10]);
  }

  // ============================================================
  // MÁSCARA DE CPF
  // ============================================================
  const campoCPF = document.getElementById('campo-cpf');
  campoCPF.addEventListener('input', function () {
    // Permite apenas dígitos
    let val = this.value.replace(/\D/g, '').slice(0, 11);
    if (val.length > 9)
      val = val.slice(0,3) + '.' + val.slice(3,6) + '.' + val.slice(6,9) + '-' + val.slice(9);
    else if (val.length > 6)
      val = val.slice(0,3) + '.' + val.slice(3,6) + '.' + val.slice(6);
    else if (val.length > 3)
      val = val.slice(0,3) + '.' + val.slice(3);
    this.value = val;
  });

  campoCPF.addEventListener('keypress', function (e) {
    if (!/[0-9]/.test(e.key)) e.preventDefault();
  });

  // ============================================================
  // MÁSCARA DE TELEFONE
  // ============================================================
  const campoTelefone = document.getElementById('campo-telefone');
  campoTelefone.addEventListener('input', function () {
    let val = this.value.replace(/\D/g, '').slice(0, 11);
    if (val.length > 10)
      val = '(' + val.slice(0,2) + ') ' + val.slice(2,7) + '-' + val.slice(7);
    else if (val.length > 6)
      val = '(' + val.slice(0,2) + ') ' + val.slice(2,6) + '-' + val.slice(6);
    else if (val.length > 2)
      val = '(' + val.slice(0,2) + ') ' + val.slice(2);
    this.value = val;
  });

  // ============================================================
  // ELEMENTOS
  // ============================================================
  const campoEmail       = document.getElementById('campo-email');
  const campoSenha       = document.getElementById('campo-senha');
  const campoConfirmacao = document.getElementById('campo-confirmacao');
  const campoNome        = document.getElementById('campo-nome');
  const campoNascimento  = document.getElementById('campo-nascimento');
  const btnIncluir       = document.getElementById('btn-incluir');
  const btnLimpar        = document.getElementById('btn-limpar');
  const btnVoltar        = document.getElementById('btn-voltar');
  const msgFeedback      = document.getElementById('msg-feedback');

  function mostrarErroCampo(campo, spanId, mensagem) {
    document.getElementById(spanId).textContent = mensagem;
    document.getElementById(spanId).style.display = 'block';
    campo.classList.add('campo-invalido');
  }

  function limparErroCampo(campo, spanId) {
    document.getElementById(spanId).textContent = '';
    document.getElementById(spanId).style.display = 'none';
    campo.classList.remove('campo-invalido');
  }

  function mostrarMensagem(tipo, texto) {
    msgFeedback.className = tipo === 'erro' ? 'msg-erro' : 'msg-sucesso';
    msgFeedback.textContent = texto;
    msgFeedback.style.display = 'block';
    msgFeedback.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Força da senha em tempo real
  campoSenha.addEventListener('input', function () {
    const f = calcularForca(this.value);
    const cls = ['ativa-fraca','ativa-media','ativa-forte'];
    ['barra1','barra2','barra3'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.className = 'forca-barra';
      if (f > i) el.classList.add(cls[f - 1]);
    });
    document.getElementById('forca-texto').textContent =
      this.value ? 'Força: ' + ['','Fraca','Média','Forte'][f] : '';
  });

  // ============================================================
  // BOTÃO INCLUIR – Validações
  // ============================================================
  btnIncluir.addEventListener('click', function () {
    let valido = true;
    const campos = ['email','senha','confirmacao','nome','cpf','nascimento','telefone'];
    campos.forEach(id => {
      const campo = document.getElementById('campo-' + id);
      if (campo) limparErroCampo(campo, 'erro-' + id);
    });
    msgFeedback.style.display = 'none';

    // E-mail
    if (!campoEmail.value.trim()) {
      mostrarErroCampo(campoEmail, 'erro-email', 'O e-mail é obrigatório.'); valido = false;
    } else if (!emailValido(campoEmail.value)) {
      mostrarErroCampo(campoEmail, 'erro-email', 'Informe um e-mail válido.'); valido = false;
    }

    // Senha
    if (!campoSenha.value) {
      mostrarErroCampo(campoSenha, 'erro-senha', 'A senha é obrigatória.'); valido = false;
    } else {
      const erros = validarSenha(campoSenha.value);
      if (erros.length) { mostrarErroCampo(campoSenha, 'erro-senha', erros[0]); valido = false; }
    }

    // Confirmação
    if (!campoConfirmacao.value) {
      mostrarErroCampo(campoConfirmacao, 'erro-confirmacao', 'Confirme a senha.'); valido = false;
    } else if (campoSenha.value !== campoConfirmacao.value) {
      mostrarErroCampo(campoConfirmacao, 'erro-confirmacao', 'As senhas não coincidem.'); valido = false;
    }

    // Nome
    const nomeVal = campoNome.value.trim();
    if (!nomeVal) {
      mostrarErroCampo(campoNome, 'erro-nome', 'O nome é obrigatório.'); valido = false;
    } else {
      const palavras = nomeVal.split(/\s+/).filter(Boolean);
      if (palavras.length < 2) {
        mostrarErroCampo(campoNome, 'erro-nome', 'Informe nome e sobrenome (mínimo duas palavras).'); valido = false;
      } else if (palavras[0].length < 2) {
        mostrarErroCampo(campoNome, 'erro-nome', 'O primeiro nome deve ter pelo menos 2 caracteres.'); valido = false;
      } else if ([...CHARS_ESPECIAIS_TODOS].some(c => nomeVal.includes(c))) {
        mostrarErroCampo(campoNome, 'erro-nome', 'O nome não pode conter caracteres especiais.'); valido = false;
      }
    }

    // CPF
    const cpfVal = campoCPF.value.trim();
    if (!cpfVal) {
      mostrarErroCampo(campoCPF, 'erro-cpf', 'O CPF é obrigatório.'); valido = false;
    } else if (!cpfValido(cpfVal)) {
      mostrarErroCampo(campoCPF, 'erro-cpf', 'CPF inválido. Verifique os dígitos.'); valido = false;
    }

    // Data de nascimento
    const nasc = campoNascimento.value;
    if (!nasc) {
      mostrarErroCampo(campoNascimento, 'erro-nascimento', 'A data de nascimento é obrigatória.'); valido = false;
    } else {
      const hoje = new Date();
      const nascDate = new Date(nasc + 'T00:00:00');
      let idade = hoje.getFullYear() - nascDate.getFullYear();
      const m = hoje.getMonth() - nascDate.getMonth();
      if (m < 0 || (m === 0 && hoje.getDate() < nascDate.getDate())) idade--;
      if (idade < 18) {
        mostrarErroCampo(campoNascimento, 'erro-nascimento', 'O cliente deve ter 18 anos ou mais.'); valido = false;
      }
    }

    // Telefone (opcional, mas se preenchido valida formato)
    const telVal = campoTelefone.value.trim();
    if (telVal) {
      const telNumeros = telVal.replace(/\D/g, '');
      if (telNumeros.length < 10 || telNumeros.length > 11) {
        mostrarErroCampo(campoTelefone, 'erro-telefone', 'Formato inválido. Use (DDD) 99999-9999.'); valido = false;
      }
    }

    if (!valido) {
      mostrarMensagem('erro', '⚠️ Corrija os erros para concluir o cadastro.');
      return;
    }

    mostrarMensagem('sucesso', '✅ Validação realizada com sucesso! Cadastro concluído.');
  });

  // ============================================================
  // BOTÃO LIMPAR
  // ============================================================
  btnLimpar.addEventListener('click', function () {
    // Limpa campos de texto e data
    ['email','senha','confirmacao','nome','cpf','nascimento','telefone'].forEach(id => {
      const campo = document.getElementById('campo-' + id);
      if (campo) {
        campo.value = '';
        campo.classList.remove('campo-invalido');
        const erro = document.getElementById('erro-' + id);
        if (erro) { erro.textContent = ''; erro.style.display = 'none'; }
      }
    });

    // Volta radio para solteiro
    document.querySelector('input[name="estado-civil"][value="solteiro"]').checked = true;

    // Volta select para "2º grau completo"
    document.getElementById('campo-escolaridade').value = '2gc';

    // Reseta indicador de força
    ['barra1','barra2','barra3'].forEach(id => {
      document.getElementById(id).className = 'forca-barra';
    });
    document.getElementById('forca-texto').textContent = '';

    msgFeedback.style.display = 'none';
    campoEmail.focus();
  });

  // ============================================================
  // BOTÃO VOLTAR
  // ============================================================
  btnVoltar.addEventListener('click', function () { history.back(); });

  // Ver/ocultar senhas
  document.getElementById('btn-ver1').addEventListener('click', function() {
    campoSenha.type = campoSenha.type === 'password' ? 'text' : 'password';
    this.textContent = campoSenha.type === 'password' ? '👁' : '🙈';
  });
  document.getElementById('btn-ver2').addEventListener('click', function() {
    campoConfirmacao.type = campoConfirmacao.type === 'password' ? 'text' : 'password';
    this.textContent = campoConfirmacao.type === 'password' ? '👁' : '🙈';
  });
</script>

</body>
</html>
